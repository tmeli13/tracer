<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Привычки Apple</title>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #1c1c1e;
            --text-color: #ffffff;
            --sub-text: #8e8e93;
            --apple-blue: #007aff;
            --apple-red: #ff3b30;
            --calendar-inactive: #2c2c2e;
            --apple-orange: #ff9500;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 375px;
        }

        h1 {
            font-size: 34px;
            font-weight: 700;
            margin: 20px 0 4px 4px;
        }

        .status-badge {
            font-size: 14px;
            font-weight: 500;
            color: var(--sub-text);
            margin: 0 0 20px 4px;
        }

        .calendar-strip {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            padding: 0 4px;
        }

        .day-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .day-name {
            font-size: 11px;
            font-weight: 600;
            color: var(--sub-text);
            text-transform: uppercase;
        }

        .day-number {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 500;
            background-color: var(--calendar-inactive);
        }

        .day-number.active {
            background-color: var(--apple-blue);
            color: white;
            font-weight: 600;
        }

        .add-habit-form {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
        }

        .add-habit-form input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            color: var(--text-color);
            outline: none;
        }

        .add-btn {
            background: var(--apple-blue);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .habit-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .habit-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .habit-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .habit-name {
            font-size: 17px;
            font-weight: 600;
        }

        .habit-streak {
            font-size: 13px;
            color: var(--apple-orange);
            font-weight: 600;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checkbox-apple {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--apple-blue);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkbox-apple.checked {
            background-color: var(--apple-blue);
        }

        .checkbox-apple.checked::after {
            content: "✓";
            color: white;
            font-size: 15px;
            font-weight: bold;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--apple-red);
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="calendar-strip">
        <div class="day-cell" onclick="changeDay('Пн')"><span class="day-name">Пн</span><span class="day-number" id="num-Пн">1</span></div>
        <div class="day-cell" onclick="changeDay('Вт')"><span class="day-name">Вт</span><span class="day-number" id="num-Вт">2</span></div>
        <div class="day-cell" onclick="changeDay('Ср')"><span class="day-name">Ср</span><span class="day-number active" id="num-Ср">3</span></div>
        <div class="day-cell" onclick="changeDay('Чт')"><span class="day-name">Чт</span><span class="day-number" id="num-Чт">4</span></div>
        <div class="day-cell" onclick="changeDay('Пт')"><span class="day-name">Пт</span><span class="day-number" id="num-Пт">5</span></div>
        <div class="day-cell" onclick="changeDay('Сб')"><span class="day-name">Сб</span><span class="day-number" id="num-Сб">6</span></div>
        <div class="day-cell" onclick="changeDay('Вс')"><span class="day-name">Вс</span><span class="day-number" id="num-Вс">7</span></div>
    </div>

    <h1 id="mainTitle">Сегодня</h1>
    <div id="statusText" class="status-badge">Впереди много дел 🎯</div>

    <div class="add-habit-form">
        <input type="text" id="habitInput" placeholder="Название привычки..." autocomplete="off">
        <button class="add-btn" onclick="addNewHabit()">Добавить</button>
    </div>
    
    <div id="listContainer" class="habit-list"></div>
</div>

<script>
    // Принудительно очищаем старый конфликтный кэш один раз
    if (!localStorage.getItem('v3_clear')) {
        localStorage.clear();
        localStorage.setItem('v3_clear', 'true');
    }

    let currentActiveDay = 'Ср';
    
    // Жестко прописанная база, которая отобразится в любом случае
    let myHabits = JSON.parse(localStorage.getItem('savedAppleHabits')) || [
        { id: 101, name: '💧 Пить воду', completedDays: [] },
        { id: 102, name: '📖 Чтение книг', completedDays: [] }
    ];

    const emojis = { 'вод': '💧', 'спорт': '🏃', 'бег': '🏃', 'чита': '📖', 'книг': '📚', 'сон': '😴', 'чист': '🧼' };

    function changeDay(clickedDay) {
        currentActiveDay = clickedDay;
        document.querySelectorAll('.day-number').forEach(el => el.classList.remove('active'));
        const targetElement = document.getElementById('num-' + clickedDay);
        if (targetElement) targetElement.classList.add('active');
        document.getElementById('mainTitle').innerText = (clickedDay === 'Ср') ? 'Сегодня' : 'Привычки (' + clickedDay + ')';
        drawPage();
    }

    function calculateStreak(completedDays) {
        let streak = 0;
        if (completedDays.includes('Ср')) {
            streak = 1;
            if (completedDays.includes('Вт')) {
                streak = 2;
                if (completedDays.includes('Пн')) {
                    streak = 3;
                }
            }
        } else {
            if (completedDays.includes('Вт')) {
                streak = 1;
                if (completedDays.includes('Пн')) {
                    streak = 2;
                }
            }
        }
        return streak;
    }

    function updateMotivationStatus(total, done) {
        const statusElement = document.getElementById('statusText');
        if (!statusElement) return;

        if (total === 0) {
            statusElement.innerText = 'Добавь свои первые привычки выше 🚀';
        } else if (done === 0) {
            statusElement.innerText = 'Впереди много дел 🎯';
        } else if (done === total) {
            statusElement.innerText = 'День закрыт на 100%! 🎉';
        } else {
            statusElement.innerText = `Отличное начало! Сделано ${done} из ${total} ⚡`;
        }
    }

    function drawPage() {
        const container = document.getElementById('listContainer');
        if (!container) return;
        container.innerHTML = '';

        let totalHabitsCount = myHabits.length;
        let completedHabitsCount = 0;

        myHabits.forEach(habit => {
            const isDone = habit.completedDays.includes(currentActiveDay);
            if (isDone) completedHabitsCount++;

            const currentStreak = calculateStreak(habit.completedDays);

            const card = document.createElement('div');
            card.className = 'habit-card';
            card.innerHTML = `
                <div class="habit-details">
                    <div class="habit-name">${habit.name}</div>
                    <div class="habit-streak" style="${currentStreak > 0 ? '' : 'display:none;'}">🔥 Серия: ${currentStreak} дн.</div>
                </div>
                <div class="actions">
                    <button class="delete-btn" onclick="removeHabit(${habit.id})">✕</button>
                    <div class="checkbox-apple ${isDone ? 'checked' : ''}" onclick="checkHabit(${habit.id})"></div>
                </div>
            `;
            container.appendChild(card);
        });

        updateMotivationStatus(totalHabitsCount, completedHabitsCount);
        localStorage.setItem('savedAppleHabits', JSON.stringify(myHabits));
    }

    function checkHabit(id) {
        myHabits.forEach(habit => {
            if (habit.id === id) {
                const index = habit.completedDays.indexOf(currentActiveDay);
                if (index > -1) {
                    habit.completedDays.splice(index, 1);
                } else {
                    habit.completedDays.push(currentActiveDay);
                }
            }
        });
        drawPage();
    }
